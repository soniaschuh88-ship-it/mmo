<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA Admin</title>
<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0a0a0f;color:#e0d8c8;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}

/* ── Layout ── */
#admin-root{display:flex;height:100vh;overflow:hidden}
#sidebar{width:200px;min-width:200px;background:#0d0d1a;border-right:1px solid #1e1e32;display:flex;flex-direction:column;padding:0}
#content{flex:1;overflow-y:auto;padding:28px 32px;background:#0a0a0f}

/* ── Sidebar ── */
.sidebar-logo{padding:20px 16px 14px;border-bottom:1px solid #1e1e32}
.logo-icon{font-size:1.4rem;margin-right:8px}
.logo-text{font-size:1rem;font-weight:700;color:#d4a017;letter-spacing:1px}
#nav{display:flex;flex-direction:column;padding:10px 8px;gap:2px;flex:1}
.nav-btn{background:none;border:none;color:#888;text-align:left;padding:9px 12px;border-radius:6px;cursor:pointer;font-size:0.85rem;transition:.15s;width:100%}
.nav-btn:hover{background:#1a1a2e;color:#c0c0d8}
.nav-btn.active{background:#1a1a35;color:#d4a017;font-weight:600}
.sidebar-footer{padding:12px 16px;border-top:1px solid #1e1e32}
.back-link{color:#555;font-size:0.78rem;text-decoration:none}
.back-link:hover{color:#d4a017}

/* ── Section ── */
.section{max-width:1000px}
.section-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:16px}
.section-title{font-size:1.5rem;font-weight:700;color:#d4a017;letter-spacing:.5px}
.section-sub{color:#666;font-size:0.82rem;margin-top:4px}
.section-placeholder{color:#555;font-size:0.9rem;padding:40px 0}

/* ── Toast ── */
.toast{background:#1a2a1a;border:1px solid #3a6a3a;border-radius:6px;padding:10px 16px;margin-bottom:16px;color:#8ada8a;font-size:0.83rem}

/* ── Form panel ── */
.form-panel{background:#0d0d1e;border:1px solid #2a2a4a;border-radius:10px;padding:20px;margin-bottom:24px}
.form-panel-title{font-size:1rem;font-weight:700;color:#c0b0e8;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px}
.field{display:flex;flex-direction:column;gap:5px}
.field-full{grid-column:1/-1}
.field label{font-size:0.78rem;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.hint{color:#555;font-size:0.72rem;margin-left:6px;text-transform:none;letter-spacing:0}
.form-actions{display:flex;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid #1e1e32}

/* ── Inputs ── */
.input{background:#0a0a18;border:1px solid #2a2a42;border-radius:6px;color:#e0d8c8;padding:8px 10px;font-size:0.85rem;outline:none;width:100%;transition:.15s}
.input:focus{border-color:#6060c0}
.input-sm{max-width:140px}
.textarea{resize:vertical;min-height:64px;font-family:inherit}
select.input{cursor:pointer}
input[readonly]{opacity:.55;cursor:not-allowed}
.color-row{display:flex;gap:8px;align-items:center}
.color-swatch{width:36px;height:36px;border:none;border-radius:6px;cursor:pointer;padding:0;background:none}

/* ── Buttons ── */
.btn{border:none;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:0.82rem;font-weight:600;transition:.15s;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:#d4a017;color:#000}
.btn-primary:hover:not(:disabled){background:#f0b820}
.btn-secondary{background:#2a2a4a;color:#c0c0e0;border:1px solid #3a3a5a}
.btn-secondary:hover{background:#3a3a6a}
.btn-ghost{background:none;color:#888;border:1px solid #2a2a42}
.btn-ghost:hover{border-color:#555;color:#ccc}
.btn-danger{background:#3a1010;color:#e07070;border:1px solid #5a2020}
.btn-danger:hover{background:#4a1818;border-color:#7a3030}
.btn-accent{background:#1a2a4a;color:#70a0d0;border:1px solid #2a3a6a}
.btn-accent:hover{background:#1a3a5a}
.btn-sm{padding:5px 10px;font-size:0.78rem}
.btn-xs{padding:3px 7px;font-size:0.73rem}

/* ── Loading ── */
.loading-spinner{color:#555;padding:40px 0;font-style:italic}

/* ── Form card (world) ── */
.form-card{background:#0d0d1e;border:1px solid #2a2a4a;border-radius:10px;padding:20px;max-width:600px}

/* ── Badge ── */
.badge{background:#1a1a2e;border:1px solid #2a2a42;border-radius:4px;padding:2px 7px;font-size:0.72rem;color:#9090b8}
.badge.gold{background:#2a1a00;color:#c0a017;border-color:#3a2a00}
.badge.xp{background:#001a2a;color:#1090c0;border-color:#002a3a}
.badge-zone{background:#1a2a1a;color:#70a070;border-color:#2a3a2a}

/* ── Card grid (biomes) ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.card{background:#0d0d1e;border:1px solid #2a2a42;border-left:3px solid #6060c0;border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:8px}
.card-header{display:flex;gap:10px;align-items:flex-start}
.card-icon{width:28px;height:28px;border-radius:4px;flex-shrink:0}
.card-title{font-weight:600;font-size:0.9rem}
.card-sub{color:#666;font-size:0.75rem}
.card-desc{color:#888;font-size:0.78rem;line-height:1.4;flex:1}
.card-meta{display:flex;gap:6px;flex-wrap:wrap}
.card-actions{display:flex;gap:6px;margin-top:4px}

/* ── Mood bar ── */
.mood-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:12px 16px;background:#0d0d1e;border:1px solid #2a2a42;border-radius:8px;max-width:400px}
.mood-label{color:#888;font-size:0.82rem;font-weight:500;white-space:nowrap}

/* ── Story arcs ── */
.arc-card{background:#0d0d1e;border:1px solid #2a2a42;border-radius:8px;margin-bottom:12px;overflow:hidden}
.arc-header{padding:14px 16px;cursor:pointer;transition:.15s}
.arc-header:hover{background:#111128}
.arc-title-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.arc-chevron{color:#6060c0;font-size:0.75rem;width:14px}
.arc-title{font-weight:600;font-size:0.95rem}
.arc-synopsis{color:#666;font-size:0.78rem;margin-left:22px}
.arc-actions-row{display:flex;align-items:center;gap:8px;padding:0 16px 12px;border-top:1px solid #1a1a2a}
.arc-beat-count{margin-left:auto;color:#555;font-size:0.75rem}
.beats-list{border-top:1px solid #1a1a2a}
.beat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 8px 36px;border-bottom:1px solid #111120}
.beat-row:last-child{border-bottom:none}
.beat-info{display:flex;flex-direction:column;gap:2px}
.beat-title{font-size:0.85rem;font-weight:500}
.beat-meta{font-size:0.73rem;color:#555}
.beat-actions{display:flex;gap:6px}
.sub-header{display:flex;justify-content:flex-end;margin-bottom:14px}

/* ── NPC table ── */
.npc-table{background:#0d0d1e;border:1px solid #2a2a42;border-radius:8px;overflow:hidden}
.table-head{display:grid;grid-template-columns:2fr 0.6fr 0.8fr 0.8fr 0.9fr 1fr;gap:0;padding:8px 12px;background:#111128;border-bottom:1px solid #2a2a42;font-size:0.72rem;color:#666;text-transform:uppercase;letter-spacing:.5px}
.table-row{display:grid;grid-template-columns:2fr 0.6fr 0.8fr 0.8fr 0.9fr 1fr;gap:0;padding:10px 12px;border-bottom:1px solid #111120;align-items:center;font-size:0.82rem}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:#0d0d20}
.npc-name{display:flex;align-items:center;gap:8px}
.npc-icon{font-size:1.3rem;width:28px;text-align:center}
.npc-name small{color:#555;font-size:0.72rem;display:block}
.row-actions{display:flex;gap:5px}
.mono{font-family:monospace;font-size:0.78rem}
.small{font-size:0.75rem;color:#888}

/* ── Quest grid ── */
.quest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.quest-card{background:#0d0d1e;border:1px solid #2a2a42;border-radius:8px;padding:14px;display:flex;gap:12px}
.quest-icon{font-size:2rem;flex-shrink:0}
.quest-body{flex:1;display:flex;flex-direction:column;gap:5px}
.quest-title{font-weight:600;font-size:0.92rem}
.quest-meta{display:flex;gap:5px;flex-wrap:wrap}
.quest-desc{color:#888;font-size:0.75rem;line-height:1.4}
.quest-giver{color:#555;font-size:0.72rem}

/* ── Loot ── */
.tab-bar{display:flex;gap:6px}
.monster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.monster-card{background:#0d0d1e;border:1px solid #2a2a42;border-radius:8px;padding:12px;text-align:center;display:flex;flex-direction:column;gap:6px;align-items:center}
.monster-icon{font-size:2rem}
.monster-name{font-weight:600;font-size:0.85rem}
.monster-stats{display:flex;gap:8px;font-size:0.73rem;color:#9090b8}
.monster-rewards{display:flex;gap:6px;font-size:0.73rem;color:#a0a060}
.item-table{background:#0d0d1e;border:1px solid #2a2a42;border-radius:8px;overflow:hidden}
.item-table .table-head{grid-template-columns:1.5fr 0.8fr 0.6fr 2fr 1fr}
.item-table .table-row{grid-template-columns:1.5fr 0.8fr 0.6fr 2fr 1fr}
.item-name{display:flex;align-items:center;gap:6px}

/* ── WAC section ── */
.wac-panel{max-width:900px}
.wac-rule-box{background:#1a1420;border:1px solid #4a2a6a;border-radius:6px;padding:10px 14px;margin-bottom:20px;font-size:0.82rem;color:#c0a0d8;line-height:1.5}
.wac-spec{font-family:monospace;font-size:0.82rem}
.wac-sub-title{font-size:1rem;font-weight:600;color:#c0b0e8;margin-bottom:14px;margin-top:4px}
.wac-error{background:#1a0a0a;border:1px solid #5a2020;border-radius:6px;padding:10px 14px;margin-top:12px;color:#e07070;font-size:0.82rem}
.wac-result{margin-top:16px}
.wac-result-label{font-size:0.75rem;color:#6060a0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.wac-json{background:#070710;border:1px solid #1a1a32;border-radius:8px;padding:14px;font-size:0.72rem;color:#9090c8;overflow:auto;max-height:500px;white-space:pre;font-family:'Cascadia Code','Fira Code',monospace}

</style>
</head>
<body>
<script type="module">
import init, { run } from '/admin/pkg/bifrost_admin.js';
async function main() {
    await init();
    run();
}
main().catch(console.error);
</script>
</body>
</html>
